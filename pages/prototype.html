<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Prototype | Cornerstone</title>

<link rel="stylesheet" href="prototype.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- HEADER -->
<header class="header">

  <div class="logo">
    <img src="../assets/images/logo.png" alt="logo">
  </div>

  <nav class="nav" id="nav">
    <div class="close-btn" id="closeBtn">✖</div>

    <a href="../index.html">Home</a>
    <a href="about.html">About</a>
    
    <a href="projects.html">Projects</a>
  
    <a href="contact.html">Contact</a>
  </nav>

  <div class="hamburger" id="hamburger">☰</div>

</header>

<div class="overlay" id="overlay"></div>

<!-- PROTOTYPE FORM -->
<section class="prototype-section">

  <div class="prototype-container">
    <h2>Build Your Prototype</h2>

    <form id="prototypeForm">

      <div class="input-group">
        <input type="text" required>
        <label>Your Name</label>
      </div>

      <div class="input-group">
        <input type="tel" required>
        <label>Contact Number</label>
      </div>

      <div class="input-group">
        <input type="text" required>
        <label>Project Title</label>
      </div>

      <div class="input-group">
        <textarea rows="3" required></textarea>
        <label>Project Description</label>
      </div>

      <div class="input-group">
        <textarea rows="2" required></textarea>
        <label>Your Expectations</label>
      </div>

      <button type="submit" class="prototype-btn">
        Send Request
      </button>

    </form>
  </div>

</section>
<!-- ===== FOOTER ===== -->
<footer class="footer">

  <div class="footer-container">

    <!-- LEFT -->
    <div class="footer-about">
      <h2>Cornerstone</h2>
      <p>
        Transforming ideas into real-world solutions through IoT,
        AI, and innovative technologies.
      </p>
    </div>

    <!-- LINKS -->
    <div class="footer-links">
      <h3>Quick Links</h3>
      <a href="index.html">Home</a>
      <a href="pages/about.html">About</a>
      
      <a href="pages/projects.html">Projects</a>
      <a href="pages/contact.html">Contact</a>
    </div>

    <!-- CONTACT -->
    <div class="footer-contact">
      <h3>Contact</h3>
      <p><i class="fas fa-phone"></i> +91 817914 3777</p>
      <p><i class="fas fa-envelope"></i> cornerstone@gmail.com</p>

      <a href="https://wa.me/918179143777" target="_blank" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> WhatsApp Us
      </a>
    </div>

  </div>

  
</footer>
<script src="prototype.js"></script>
</body>
</html>
